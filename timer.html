<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>计时器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .sub {
      text-align: center;
      color: rgba(255, 255, 255, 0.65);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 14px;
      padding: 6px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.72);
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .tab.active {
      background: #fff;
      color: #111827;
      font-weight: 600;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .time {
      text-align: center;
      font-size: 54px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 24px 0;
      font-family: Consolas, monospace;
      word-break: break-all;
    }

    .btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button.action {
      border: none;
      padding: 12px 22px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .primary {
      background: #ffffff;
      color: #111827;
      font-weight: 600;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .input-box label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
    }

    .input-box input {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.18);
      color: #fff;
      text-align: center;
      font-size: 18px;
      outline: none;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 20px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #ffffff;
      transition: width 0.3s linear;
    }

    .tip {
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 14px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 20px;
      }

      .time {
        font-size: 40px;
      }

      .inputs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>计时器</h1>
    <div class="sub">支持正计时与倒计时</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('stopwatch')">正计时</button>
      <button class="tab" onclick="switchTab('countdown')">倒计时</button>
    </div>

    <div id="stopwatch" class="panel active">
      <div id="stopwatchDisplay" class="time">00:00:00.00</div>
      <div class="btns">
        <button id="startPauseBtn" class="action primary" onclick="toggleStopwatch()">开始</button>
        <button class="action secondary" onclick="resetStopwatch()">重置</button>
      </div>
      <div class="tip">适合学习、工作、运动计时</div>
    </div>

    <div id="countdown" class="panel">
      <div class="inputs">
        <div class="input-box">
          <label>时</label>
          <input id="hours" type="number" min="0" value="0" />
        </div>
        <div class="input-box">
          <label>分</label>
          <input id="minutes" type="number" min="0" value="5" />
        </div>
        <div class="input-box">
          <label>秒</label>
          <input id="seconds" type="number" min="0" value="0" />
        </div>
      </div>

      <div id="countdownDisplay" class="time">00:05:00</div>

      <div class="btns">
        <button class="action secondary" onclick="setCountdown()">设置时间</button>
        <button id="countdownBtn" class="action primary" onclick="toggleCountdown()">开始</button>
        <button class="action secondary" onclick="resetCountdown()">重置</button>
      </div>

      <div class="progress-wrap">
        <div id="progressBar" class="progress"></div>
      </div>

      <div id="countdownTip" class="tip">专注进行中</div>
    </div>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));

      if (tabId === "stopwatch") {
        document.querySelectorAll(".tab")[0].classList.add("active");
      } else {
        document.querySelectorAll(".tab")[1].classList.add("active");
      }

      document.getElementById(tabId).classList.add("active");
    }

    function pad(n, len = 2) {
      return String(n).padStart(len, "0");
    }

    // 正计时
    let stopwatchRunning = false;
    let stopwatchStart = 0;
    let stopwatchElapsed = 0;
    let stopwatchTimer = null;

    function formatStopwatch(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const centiseconds = Math.floor((ms % 1000) / 10);
      return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}.${pad(centiseconds)}`;
    }

    function updateStopwatch() {
      const now = Date.now();
      stopwatchElapsed = now - stopwatchStart;
      document.getElementById("stopwatchDisplay").textContent = formatStopwatch(stopwatchElapsed);
    }

    function toggleStopwatch() {
      const btn = document.getElementById("startPauseBtn");

      if (!stopwatchRunning) {
        stopwatchRunning = true;
        stopwatchStart = Date.now() - stopwatchElapsed;
        stopwatchTimer = setInterval(updateStopwatch, 10);
        btn.textContent = "暂停";
      } else {
        stopwatchRunning = false;
        clearInterval(stopwatchTimer);
        btn.textContent = "继续";
      }
    }

    function resetStopwatch() {
      stopwatchRunning = false;
      clearInterval(stopwatchTimer);
      stopwatchElapsed = 0;
      document.getElementById("stopwatchDisplay").textContent = "00:00:00.00";
      document.getElementById("startPauseBtn").textContent = "开始";
    }

    // 倒计时
    let countdownRunning = false;
    let countdownTimer = null;
    let totalCountdownSeconds = 300;
    let remainingSeconds = 300;

    function formatCountdown(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function updateCountdownDisplay() {
      document.getElementById("countdownDisplay").textContent = formatCountdown(remainingSeconds);

      const progress = totalCountdownSeconds > 0
        ? ((totalCountdownSeconds - remainingSeconds) / totalCountdownSeconds) * 100
        : 0;

      document.getElementById("progressBar").style.width = progress + "%";

      document.getElementById("countdownTip").textContent =
        remainingSeconds === 0 ? "时间到" : "专注进行中";
    }

    function setCountdown() {
      const h = parseInt(document.getElementById("hours").value) || 0;
      const m = parseInt(document.getElementById("minutes").value) || 0;
      const s = parseInt(document.getElementById("seconds").value) || 0;

      totalCountdownSeconds = h * 3600 + m * 60 + s;
      remainingSeconds = totalCountdownSeconds;

      countdownRunning = false;
      clearInterval(countdownTimer);
      document.getElementById("countdownBtn").textContent = "开始";
      updateCountdownDisplay();
    }

    function toggleCountdown() {
      const btn = document.getElementById("countdownBtn");

      if (remainingSeconds <= 0) {
        setCountdown();
      }

      if (!countdownRunning) {
        if (remainingSeconds <= 0) return;
        countdownRunning = true;
        btn.textContent = "暂停";

        countdownTimer = setInterval(() => {
          if (remainingSeconds > 0) {
            remainingSeconds--;
            updateCountdownDisplay();
          } else {
            clearInterval(countdownTimer);
            countdownRunning = false;
            btn.textContent = "开始";
            alert("时间到！");
          }
        }, 1000);
      } else {
        countdownRunning = false;
        clearInterval(countdownTimer);
        btn.textContent = "继续";
      }
    }

    function resetCountdown() {
      countdownRunning = false;
      clearInterval(countdownTimer);
      remainingSeconds = totalCountdownSeconds;
      document.getElementById("countdownBtn").textContent = "开始";
      updateCountdownDisplay();
    }

    updateCountdownDisplay();
  </script>
</body>
</html>
